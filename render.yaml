services:
  - type: web
    name: simtura
    env: node
    buildCommand: npm install --include=dev && npm run build && npm run db:push -- --force
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
