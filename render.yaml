services:
  - type: web
    name: simtura
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: node script/db-migrate.js && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
